name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

env:
  HUSKY: "0"

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xo
          POSTGRES_PASSWORD: xo
          POSTGRES_DB: xo_arena_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@callidity'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=backend --workspace=packages/ai --workspace=packages/db --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate --schema=../packages/db/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://xo:xo@localhost:5432/xo_arena_test

      - name: Run migrations
        working-directory: backend
        run: npx prisma migrate deploy --schema=../packages/db/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://xo:xo@localhost:5432/xo_arena_test

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          DATABASE_URL: postgresql://xo:xo@localhost:5432/xo_arena_test
          BETTER_AUTH_SECRET: ci-test-secret-not-used-in-prod
          BETTER_AUTH_URL: http://localhost:3000
          FRONTEND_URL: http://localhost:5173
          NODE_ENV: test
          NODE_OPTIONS: --experimental-transform-types

  ai-package-test:
    name: AI package tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@callidity'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=packages/ai --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: npm test --workspace=packages/ai

