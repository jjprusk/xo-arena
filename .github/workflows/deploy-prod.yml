name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Fly.io production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        run: flyctl deploy --config backend/fly.toml --app xo-backend-prod --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy frontend
        run: flyctl deploy --config frontend/fly.toml --app xo-frontend-prod --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy landing
        run: flyctl deploy --config landing/fly.toml --app xo-landing-prod --remote-only --build-arg VITE_XO_URL=https://xo-frontend-prod.fly.dev
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy tournament
        run: flyctl deploy --config tournament/fly.toml --app xo-tournament-prod --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
