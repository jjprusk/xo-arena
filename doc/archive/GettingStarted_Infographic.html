<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>XO Arena — Getting Started</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #060810;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    overflow: hidden;
    padding: 0;
  }
  svg { max-width: 100%; height: auto; border-radius: 28px; box-shadow: 0 48px 120px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05); }
  .play-btn { cursor: pointer; }
  .play-btn rect { transition: opacity 0.15s; }
  .play-btn:hover rect { opacity: 1 !important; }
  .play-btn:hover .play-arrow { transform: translateX(3px); }
  .feedback-balloon { cursor: pointer; }
  .have-fun-balloon { cursor: pointer; }
  @keyframes pfly {
    0%   { transform: translate(-50%,-50%) rotate(0deg) scale(1); opacity: 1; }
    75%  { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--vx)), calc(-50% + var(--vy))) rotate(var(--rot)) scale(0.5); opacity: 0; }
  }
  @keyframes balloon-rise {
    0%   { transform: translate(0, 0) scale(0.4); opacity: 0; }
    12%  { opacity: 1; transform: translate(0, -30px) scale(1.05); }
    100% { transform: translate(var(--drift), -680px) scale(1); opacity: 0; }
  }
  @keyframes trophy-pop {
    0%   { transform: scale(1); }
    20%  { transform: scale(1.25) rotate(-8deg); }
    45%  { transform: scale(1.15) rotate(8deg); }
    65%  { transform: scale(1.1) rotate(-4deg); }
    80%  { transform: scale(1.05) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  #haveFunBalloon { transform-origin: 468px 578px; transform-box: fill-box; }
  #haveFunBalloon.pop { animation: trophy-pop 0.6s ease-out; }
</style>
</head>

<script>
  function haveFun() {
    // Pop the trophy balloon
    const g = document.getElementById('haveFunBalloon')
    g.classList.remove('pop')
    void g.offsetWidth // reflow to restart animation
    g.classList.add('pop')
    g.addEventListener('animationend', () => g.classList.remove('pop'), { once: true })

    const emojis = ['🎈','🎉','✨','🎊','⭐','🎆','🎇','🎀','🥳','🎁']
    const colors = ['#f59e0b','#6366f1','#ec4899','#10b981','#3b82f6','#f87171','#a78bfa','#fde68a','#6ee7b7','#fbcfe8']

    const svg = document.querySelector('svg')
    const r   = svg.getBoundingClientRect()
    const sx  = r.width  / 960
    const sy  = r.height / 720
    const ox  = r.left + 468 * sx
    const oy  = r.top  + 578 * sy

    const container = document.createElement('div')
    container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;'
    document.body.appendChild(container)

    function burst(content, isEmoji) {
      const el   = document.createElement('div')
      const ang  = (Math.random() * 360) * Math.PI / 180
      const spd  = 120 + Math.random() * 260
      const vx   = Math.cos(ang) * spd
      const vy   = Math.sin(ang) * spd - 90
      const size = isEmoji ? 22 + Math.random() * 20 : 5 + Math.random() * 9
      const dur  = 1300 + Math.random() * 900
      const del  = Math.random() * 300
      const rot  = (Math.random() * 720 - 360).toFixed(0)
      if (isEmoji) {
        el.textContent = content
        el.style.cssText = `position:absolute;left:${ox}px;top:${oy}px;font-size:${size}px;line-height:1;transform:translate(-50%,-50%);--vx:${vx}px;--vy:${vy}px;--rot:${rot}deg;animation:pfly ${dur}ms ${del}ms cubic-bezier(.15,.8,.35,1) forwards;`
      } else {
        const circle = Math.random() > 0.4
        el.style.cssText = `position:absolute;left:${ox}px;top:${oy}px;width:${size}px;height:${circle ? size : size*1.8}px;border-radius:${circle?'50%':'3px'};background:${content};transform:translate(-50%,-50%);--vx:${vx}px;--vy:${vy}px;--rot:${rot}deg;animation:pfly ${dur}ms ${del}ms cubic-bezier(.15,.8,.35,1) forwards;`
      }
      container.appendChild(el)
    }

    for (let i = 0; i < 20; i++) burst(emojis[Math.floor(Math.random()*emojis.length)], true)
    for (let i = 0; i < 60; i++) burst(colors[Math.floor(Math.random()*colors.length)], false)

    // Floating balloons rising from below
    const floatEmojis = ['🎈','🎉','🎊']
    for (let i = 0; i < 10; i++) {
      const el    = document.createElement('div')
      const startX = r.left + 60 + Math.random() * (r.width - 120)
      const drift  = ((Math.random() - 0.5) * 140).toFixed(0)
      const size   = 26 + Math.random() * 22
      const dur    = 2800 + Math.random() * 1600
      const del    = 100 + Math.random() * 700
      el.textContent = floatEmojis[Math.floor(Math.random()*floatEmojis.length)]
      el.style.cssText = `position:absolute;left:${startX}px;top:${r.bottom+30}px;font-size:${size}px;line-height:1;--drift:${drift}px;animation:balloon-rise ${dur}ms ${del}ms ease-in forwards;`
      container.appendChild(el)
    }

    setTimeout(() => container.remove(), 5000)
  }

  function openFeedback() {
    const msg = { type: 'open-feedback' }
    if (window.opener) {
      // Opened from the app in a new tab — send back to it
      window.opener.postMessage(msg, '*')
    } else if (window.parent !== window) {
      // Embedded in an iframe
      window.parent.postMessage(msg, '*')
    } else {
      // Same window — post to self (app is running here)
      window.postMessage(msg, '*')
    }
  }
</script>
