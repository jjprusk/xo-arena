services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xo
      POSTGRES_PASSWORD: xo
      POSTGRES_DB: xo_arena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xo -d xo_arena"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://xo:xo@postgres:5432/xo_arena
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173,http://localhost:5174
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app/backend
      - ./packages/ai:/app/packages/ai
      - ./packages/db:/app/packages/db
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    # API uses relative URLs via Vite proxy — no VITE_API_URL needed
    environment:
      VITE_PLATFORM_URL: http://localhost:5174
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./packages/xo:/packages/xo   # resolve alias: __dirname(/app)/../packages/xo
      - /app/node_modules
    depends_on:
      - backend

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3000
      TOURNAMENT_URL: http://tournament:3001
      VITE_XO_URL: http://localhost:5173
    ports:
      - "5174:5174"
    volumes:
      - ./landing:/app
      - ./packages/xo:/packages/xo   # resolve alias: __dirname(/app)/../packages/xo
      - /app/node_modules
    depends_on:
      - backend

  tournament:
    build:
      context: .
      dockerfile: tournament/Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://xo:xo@postgres:5432/xo_arena
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5174,http://localhost:5173
    ports:
      - "3001:3001"
    volumes:
      - ./tournament:/app/tournament
      - ./packages/db:/app/packages/db
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
